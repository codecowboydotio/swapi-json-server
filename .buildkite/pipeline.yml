#    if: build.branch == "main"
  - label: "Running scan on branch $BUILDKITE_BRANCH :buildkite: for repo $BUILDKITE_REPO :github:"
    command: |
      set -x
      export SECURE_API_TOKEN=\$(aws secretsmanager get-secret-value --secret-id svk/sysdig | jq -r .SecretString | awk -F '"' '{print \$4}') 
      #echo \$SECURE_API_TOKEN
      sudo sysdig-cli-scanner --apiurl https://app.au1.sysdig.com swapi
